  <style>
    :root {

      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --ok: #166534;
      --bad: #991b1b;
      --border: #dbe3ef;
    }
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    .wrap { max-width: 980px; margin: 0 auto; padding: 20px; }
    .top { position: sticky; top: 0; background: #f4f6fb; padding-bottom: 12px; z-index: 5; }
    h1 { margin: 0 0 8px; font-size: 26px; }
    .sub { color: var(--muted); margin: 0 0 12px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .chip { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 8px 12px; font-weight: bold; }
    #temporizador { color: #b91c1c; }
    .pregunta { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin: 12px 0; }
    .pregunta p { margin: 0 0 10px; font-weight: bold; line-height: 1.35; }
    label { display: block; margin: 6px 0; padding: 6px 8px; border-radius: 6px; }
    label:hover { background: #f8fafc; }
    .acciones { margin: 18px 0; display: flex; gap: 10px; }
    button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
    #enviarBtn { background: var(--accent); color: #fff; font-weight: bold; }
    #enviarBtn:disabled { opacity: .55; cursor: not-allowed; }
    #resultado { margin-top: 14px; font-size: 18px; font-weight: bold; }
    .retro { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 14px; }
    .correcta { background: #ecfdf3; border: 1px solid #86efac; color: var(--ok); }
    .incorrecta { background: #fef2f2; border: 1px solid #fca5a5; color: var(--bad); }
  </style>
</head>

    const examen = document.getElementById('examen');
    const enviarBtn = document.getElementById('enviarBtn');
    const resultado = document.getElementById('resultado');
    const temporizadorEl = document.getElementById('temporizador');
    const contadorPreguntas = document.getElementById('contadorPreguntas');

    function mezclar(array) {
      const copia = [...array];
      for (let i = copia.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copia[i], copia[j]] = [copia[j], copia[i]];
      }
      return copia;
    }

    const preguntasAleatorias = mezclar(preguntas);
    contadorPreguntas.textContent = `Total de preguntas: ${preguntasAleatorias.length}`;

    preguntasAleatorias.forEach((item, i) => {
      const contenedor = document.createElement('div');
      contenedor.className = 'pregunta';
      contenedor.dataset.index = i;

      const titulo = document.createElement('p');
      titulo.textContent = `${i + 1}. ${item.pregunta}`;
      contenedor.appendChild(titulo);

      item.opciones.forEach((opcion, j) => {
        const etiqueta = document.createElement('label');
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `pregunta-${i}`;
        radio.value = j;
        etiqueta.appendChild(radio);
        etiqueta.appendChild(document.createTextNode(' ' + opcion));
        contenedor.appendChild(etiqueta);
      });

      const retro = document.createElement('div');
      retro.className = 'retro';
      retro.style.display = 'none';
      retro.id = `retro-${i}`;
      contenedor.appendChild(retro);

      examen.appendChild(contenedor);
    });

    let examenEnviado = false;
    let tiempoRestante = 3 * 60 * 60; // 3 horas en segundos

    function formatearTiempo(segundos) {
      const h = String(Math.floor(segundos / 3600)).padStart(2, '0');
      const m = String(Math.floor((segundos % 3600) / 60)).padStart(2, '0');
      const s = String(segundos % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function deshabilitarExamen() {
      document.querySelectorAll('input[type="radio"]').forEach(inp => inp.disabled = true);
      enviarBtn.disabled = true;
    }

    function enviarExamen(forzadoPorTiempo = false) {
      if (examenEnviado) return;
      examenEnviado = true;
      clearInterval(intervaloTemporizador);

      let aciertos = 0;

      preguntasAleatorias.forEach((item, i) => {
        const seleccionada = document.querySelector(`input[name="pregunta-${i}"]:checked`);
        const retro = document.getElementById(`retro-${i}`);
        const correctaTexto = item.opciones[item.correcta];

        if (seleccionada && Number(seleccionada.value) === item.correcta) {
          aciertos++;
          retro.className = 'retro correcta';
          retro.textContent = `✅ Correcta. Respuesta: ${correctaTexto}`;
        } else {
          retro.className = 'retro incorrecta';
          if (seleccionada) {
            const elegida = item.opciones[Number(seleccionada.value)];
            retro.textContent = `❌ Incorrecta. Tu respuesta: ${elegida} | Correcta: ${correctaTexto}`;
          } else {
            retro.textContent = `❌ Sin respuesta. Correcta: ${correctaTexto}`;
          }
        }
        retro.style.display = 'block';
      });

      const total = preguntasAleatorias.length;
      const errores = total - aciertos;
      const extra = forzadoPorTiempo ? ' (el tiempo se agotó)' : '';
      resultado.textContent = `Resultado final${extra}: Aciertos: ${aciertos} | Errores: ${errores} | Total: ${total}`;

      deshabilitarExamen();
    }

    temporizadorEl.textContent = formatearTiempo(tiempoRestante);
    const intervaloTemporizador = setInterval(() => {
      if (examenEnviado) return;
      tiempoRestante--;
      temporizadorEl.textContent = formatearTiempo(Math.max(0, tiempoRestante));
      if (tiempoRestante <= 0) {
        enviarExamen(true);
      }
    }, 1000);

    enviarBtn.addEventListener('click', () => enviarExamen(false));
  </script>
